debug: false
storage:
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    database: clientwatch
    username: root
    password: ''
privacy:
  store-ip-addresses: true
detection:
  collect-client-brand: true
  brand-timeout-seconds: 8
